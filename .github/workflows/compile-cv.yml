name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/*.tex'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore photo from secret
        run: printf '%s' "${{ secrets.CV_PHOTO }}" | base64 -d > cv/photo.jpg && ls -lh cv/photo.jpg

      - name: Compile cv_moderncv.tex
        working-directory: cv
        run: latexmk -pdf -file-line-error -halt-on-error -interaction=nonstopmode cv_moderncv.tex

      - name: Commit compiled PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv/cv_moderncv.pdf
          git diff --staged --quiet || git commit -m "ci: compile cv_moderncv.tex to PDF"
          git push
