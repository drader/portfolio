name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/*.tex'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore photo from secret
        run: echo "${{ secrets.CV_PHOTO }}" | base64 -d > cv/photo.jpg

      - name: Compile cv_moderncv.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/cv_moderncv.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false

      - name: Commit compiled PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv/cv_moderncv.pdf
          git diff --staged --quiet || git commit -m "ci: compile cv_moderncv.tex to PDF"
          git push
