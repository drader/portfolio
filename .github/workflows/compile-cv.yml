name: Compile LaTeX CV

on:
  push:
    paths:
      - 'cv/*.tex'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile cv_moderncv.tex
        uses: xu-cheng/latex-action@v3
        env:
          CV_PHOTO_B64: ${{ secrets.CV_PHOTO }}
        with:
          root_file: cv/cv_moderncv.tex
          work_in_root_file_dir: true
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          pre_compile: "printf '%s' \"$CV_PHOTO_B64\" | base64 -d > cv/photo.jpg && echo 'Photo written:' && ls -lh cv/photo.jpg"

      - name: Commit compiled PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cv/cv_moderncv.pdf
          git diff --staged --quiet || git commit -m "ci: compile cv_moderncv.tex to PDF"
          git push
